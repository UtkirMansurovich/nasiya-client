<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a7abf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#a8d8ff;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="400" height="160" rx="20" ry="20" fill="url(#bgGrad)" />

  <!-- Decorative circle background -->
  <circle cx="72" cy="80" r="52" fill="#ffffff" fill-opacity="0.07" />
  <circle cx="72" cy="80" r="40" fill="#ffffff" fill-opacity="0.07" />

  <!-- Coin icon -->
  <circle cx="72" cy="80" r="32" fill="url(#coinGrad)" filter="url(#shadow)" />
  <circle cx="72" cy="80" r="26" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4" />

  <!-- Coin symbol (so'm sign ₸ or custom) -->
  <text x="72" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#7a4a00">₴</text>

  <!-- Handshake / arrow curve indicating credit -->
  <path d="M118 68 Q135 55 155 68" stroke="url(#arrowGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="155,62 162,72 148,72" fill="#a8d8ff" opacity="0.9"/>

  <path d="M118 92 Q135 105 155 92" stroke="url(#arrowGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="118,86 111,96 125,96" fill="#ffffff" opacity="0.9"/>

  <!-- Main title -->
  <text x="175" y="75" font-family="'Trebuchet MS', Tahoma, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="1">NASIYA</text>

  <!-- Subtitle -->
  <text x="177" y="108" font-family="'Trebuchet MS', Tahoma, sans-serif" font-size="21" font-weight="400" fill="#f7c948" letter-spacing="4">SAVDO</text>

  <!-- Thin divider line -->
  <line x1="175" y1="84" x2="365" y2="84" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.25" />

  <!-- Tagline -->
  <text x="177" y="130" font-family="Tahoma, sans-serif" font-size="10.5" fill="#a8d8ff" letter-spacing="1.5" font-style="italic">Ishonchli nasiya — qulay to'lov</text>
</svg>
